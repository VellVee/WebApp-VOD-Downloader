<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Video Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="glass-bg"></div>

    <main class="container">
        <header class="glass-panel header">
            <h1 class="logo">Web Video <span>Downloader</span></h1>
            <div style="display:flex; align-items:center;">
                <button id="theme-btn" class="icon-btn" style="margin-right:0.5rem;" title="Toggle Light/Dark Mode">
                    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <button id="hamburger-btn" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </header>

        <section class="glass-panel input-section">
            <input type="text" id="url-input" placeholder="Paste link here (YouTube, Twitch, VOD, etc...)"
                autocomplete="off">
            <div class="options-row">
                <label class="toggle-row">
                    <span class="toggle-switch">
                        <input type="checkbox" id="delay-cb">
                        <span class="toggle-slider"></span>
                    </span>
                    Delay download by
                </label>
                <div class="spinner-group">
                    <button type="button" class="spinner-btn" id="delay-minus">−</button>
                    <input type="number" id="delay-mins" value="180" min="1" max="10000" disabled>
                    <button type="button" class="spinner-btn" id="delay-plus">+</button>
                </div>
                <span style="margin-right: 15px;">min</span>
                <div style="margin-left: auto; display: flex; align-items: center;">
                    <label for="vod-date" style="margin-right: 10px;">VOD Date:</label>
                    <input type="date" id="vod-date" class="date-picker">
                </div>
            </div>
            <div class="actions-row">
                <button class="btn btn-default" id="btn-default">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Regular Download
                </button>
                <button class="btn btn-vod" id="btn-vod">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    VOD Download
                </button>
            </div>
        </section>

        <section class="glass-panel list-section">
            <div class="list-header">
                <h2>Downloads</h2>
                <div class="list-controls">
                    <button id="btn-stop-all" class="btn-small btn-danger">Stop All</button>
                    <button id="btn-clear-finished" class="btn-small">Clear Finished</button>
                </div>
            </div>
            <div id="tasks-container" class="tasks-container">
                <!-- Tasks injected here via JS -->
            </div>
        </section>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-modal" class="icon-btn">&times;</button>
            </div>
            <div class="modal-body">
                
                <h3 class="section-title">Backend Configuration</h3>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Default Save Path (Regular)</label>
                    <input type="text" id="setting-default-path">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>VOD Save Path (Purple)</label>
                    <input type="text" id="setting-vod-path">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Server Port <span style="font-size:0.8rem; opacity:0.7;">(Requires restart)</span></label>
                    <input type="number" id="setting-port" placeholder="5557">
                </div>

                <h3 class="section-title">Security &amp; Save</h3>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>New Admin Password <span style="font-size:0.8rem; opacity:0.7;">(Leave blank to keep)</span></label>
                    <input type="password" id="setting-new-password" placeholder="New Password">
                </div>
                <div class="form-group" style="margin-bottom: 0.5rem;">
                    <label>Current Admin Password</label>
                    <input type="password" id="setting-password" placeholder="Required to save changes">
                </div>
                <button id="btn-save-paths" class="btn btn-default" style="width: 100%; padding: 0.7rem; font-size: 1rem; margin-bottom: 1.5rem;">Save Backend Settings</button>
                
                <h3 class="section-title">Client Preferences</h3>
                <label class="toggle-row">
                    <span class="toggle-switch">
                        <input type="checkbox" id="setting-clear-all">
                        <span class="toggle-slider"></span>
                    </span>
                    "Clear Finished" removes cancelled &amp; errored jobs.
                </label>
            </div>
            <div class="modal-footer" style="justify-content: space-between;">
                <button id="btn-restart-server" class="btn btn-danger" style="flex: 0 0 auto; padding: 0.6rem 1rem; font-size: 0.9rem;">Restart Server</button>
                <button id="btn-save-preferences" class="btn btn-vod" style="flex: 0 0 auto; padding: 0.6rem 1rem; font-size: 0.9rem;">Save Preferences</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
